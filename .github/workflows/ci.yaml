name: CI
on:
  pull_request:

jobs:
  checks:
    env:
      NUXT_PRETALX_API_TOKEN: ${{ secrets.NUXT_PRETALX_API_TOKEN }}
      NUXT_PRETALX_API_URL: ${{ secrets.NUXT_PRETALX_API_URL }}
      NUXT_GOOGLE_SHEET_ID: ${{ secrets.NUXT_GOOGLE_SHEET_ID }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install

      - run: pnpm lint

      - run: pnpm build
