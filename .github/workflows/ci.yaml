name: CI
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    env:
      NUXT_PRETALX_API_TOKEN: ${{ secrets.NUXT_PRETALX_API_TOKEN }}
      NUXT_PRETALX_API_URL: ${{ secrets.NUXT_PRETALX_API_URL }}
      NUXT_GOOGLE_SHEET_ID: ${{ secrets.NUXT_GOOGLE_SHEET_ID }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install

      - run: pnpm lint

      - run: pnpm build
